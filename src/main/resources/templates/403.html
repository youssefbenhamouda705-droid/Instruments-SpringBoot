<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="utf-8">
    <title>403 - Accès Refusé</title>
    <link rel="stylesheet"
          th:href="@{/webjars/bootstrap/4.3.1/css/bootstrap.min.css}"/>
    <style>
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .error-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(233, 69, 96, 0.3);
            border-radius: 20px;
            padding: 50px 40px;
            text-align: center;
            max-width: 500px;
        }
        .error-icon { font-size: 80px; margin-bottom: 20px; }
        .error-code { color: #e94560; font-size: 4rem; font-weight: 900; margin: 0; }
        .error-title { color: #ffffff; font-size: 1.5rem; font-weight: 600; margin-bottom: 15px; }
        .error-msg { color: rgba(255,255,255,0.6); margin-bottom: 30px; line-height: 1.6; }
        .btn-home {
            background: linear-gradient(135deg, #e94560, #c0392b);
            border: none;
            border-radius: 10px;
            padding: 12px 30px;
            font-weight: 600;
            color: white;
            text-decoration: none;
            transition: all 0.3s ease;
            display: inline-block;
        }
        .btn-home:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(233, 69, 96, 0.4);
            color: white;
            text-decoration: none;
        }
        .user-info {
            background: rgba(255,255,255,0.05);
            border-radius: 10px;
            padding: 10px 20px;
            margin-bottom: 25px;
            color: rgba(255,255,255,0.6);
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
<div class="error-card">
    <p class="error-code">403</p>
    <h1 class="error-title">Accès Refusé</h1>
    <div class="user-info">
        Connecté en tant que : <strong sec:authentication="name">utilisateur</strong>
    </div>
    <p class="error-msg">
        Vous n'avez pas les permissions nécessaires pour accéder à cette page.<br>
        Cette action est réservée aux administrateurs.
    </p>
    <a th:href="@{/ListeInstruments}" class="btn-home">
        Retour à l'accueil
    </a>
</div>

<script th:src="@{/webjars/jquery/3.5.1/jquery.min.js}"></script>
<script th:src="@{/webjars/bootstrap/4.3.1/js/bootstrap.min.js}"></script>
</body>
</html>
