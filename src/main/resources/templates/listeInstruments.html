<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="utf-8">
    <title>Liste des Instruments</title>
    <link rel="stylesheet"
          th:href="@{/webjars/bootstrap/4.3.1/css/bootstrap.min.css}"/>
</head>
<body>

<div th:replace="~{template :: navbar}"></div>

<div class="container mt-4">
    <div class="card shadow-sm">
        <div class="card-header bg-dark text-white">
            <h4 class="mb-0"> Liste des Instruments</h4>
        </div>
        <div class="card-body">

            <a class="btn btn-success mb-3"
               th:href="@{/showCreate}"
               sec:authorize="hasRole('ADMIN')">
                Ajouter un Instrument
            </a>

            <table class="table table-striped table-bordered table-hover">
                <thead class="thead-dark">
                    <tr>
                        <th>ID</th>
                        <th>Nom</th>
                        <th>Prix (DT)</th>
                        <th>Genre Musical</th>
                        <th sec:authorize="hasRole('ADMIN')">Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="i : ${instruments.content}">
                        <td th:text="${i.idInstrument}"></td>
                        <td th:text="${i.nomInstrument}"></td>
                        <td th:text="${i.prixInstrument}"></td>
                        <td th:text="${i.genreMusical != null ? i.genreMusical.nomGenre : 'Pas de Genre'}"></td>
                        <td sec:authorize="hasRole('ADMIN')">
                            <a class="btn btn-warning btn-sm"
                               th:href="@{/modifierInstrument(id=${i.idInstrument},page=${currentPage},size=${size})}">
                                 Modifier
                            </a>
                            <a class="btn btn-danger btn-sm ml-1"
                               onclick="return confirm('Êtes-vous sûr de vouloir supprimer cet instrument ?')"
                               th:href="@{/supprimerInstrument(id=${i.idInstrument},page=${currentPage},size=${size})}">
                                 Supprimer
                            </a>
                        </td>
                    </tr>
                    <tr th:if="${instruments.content.empty}">
                        <td colspan="5" class="text-center text-muted">
                            Aucun instrument trouvé.
                        </td>
                    </tr>
                </tbody>
            </table>

            <ul class="nav nav-pills" th:if="${instruments.totalPages > 1}">
                <li th:each="page, status : ${pages}" class="mr-1">
                    <a th:class="${status.index == currentPage ? 'btn btn-primary' : 'btn btn-secondary'}"
                       th:href="@{/ListeInstruments(page=${status.index},size=${size})}"
                       th:text="${status.index + 1}">
                    </a>
                </li>
            </ul>

        </div>
    </div>
</div>

<script th:src="@{/webjars/jquery/3.5.1/jquery.min.js}"></script>
<script th:src="@{/webjars/bootstrap/4.3.1/js/bootstrap.min.js}"></script>
</body>
</html>
